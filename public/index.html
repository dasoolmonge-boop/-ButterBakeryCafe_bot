<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Butter Bakery Cafe</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <div class="logo">🥐 Butter Bakery</div>
            <div class="user-info" id="userInfo">
                <span id="userName">Загрузка...</span>
                <!-- Кнопка админ-панели (будет показываться только админам) -->
                <button id="adminBtn" style="display: none;" onclick="goToAdmin()">👑</button>
            </div>
        </header>

        <!-- Навигация по категориям -->
        <div class="categories-nav" id="categoriesNav">
            <button class="category-btn active" data-category-id="all">Все</button>
        </div>

        <!-- Основной контент - товары в 2 столбца -->
        <div class="cakes-grid" id="cakesGrid"></div>

        <!-- Корзина -->
        <div class="cart-sidebar" id="cartSidebar">
            <h3>🛒 Корзина</h3>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal">0 ₽</div>
            <button class="btn btn-primary btn-block" id="checkoutBtn" onclick="openOrderModal()">Заказать</button>
        </div>
    </div>

    <!-- Модальное окно заказа -->
    <div id="orderModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Оформление</h2>
                <button class="modal-close" onclick="closeOrderModal()">×</button>
            </div>
            <form id="orderForm" onsubmit="submitOrder(event)">
                <div class="form-group">
                    <input type="text" class="form-input" id="customerName" placeholder="Ваше имя" required>
                </div>
                
                <div class="form-group">
                    <input type="tel" class="form-input" id="customerPhone" placeholder="Телефон" required>
                </div>
                
                <div class="form-group">
                    <textarea class="form-textarea" id="customerAddress" placeholder="Адрес доставки" required></textarea>
                </div>
                
                <div class="form-group">
                    <input type="date" class="form-input" id="deliveryDate" required>
                </div>
                
                <div class="form-group">
                    <input type="time" class="form-input" id="deliveryTime" required>
                </div>
                
                <div class="form-group">
                    <textarea class="form-textarea" id="orderWish" placeholder="Пожелания"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">✅ Подтвердить</button>
            </form>
        </div>
    </div>

    <script>
        // Глобальные переменные
        let tg = window.Telegram?.WebApp;
        let user = null;
        let cart = [];
        let categories = [];
        let allCakes = [];
        let currentCategory = 'all';

        // Инициализация приложения
        async function init() {
            if (tg) {
                tg.expand();
                tg.ready();
                tg.setHeaderColor('#1A1512');
                tg.setBackgroundColor('#1A1512');
                
                const tgUser = tg.initDataUnsafe?.user;
                if (tgUser) {
                    user = await registerUser(tgUser);
                    document.getElementById('userName').textContent = user.firstName?.split(' ')[0] || 'Гость';
                    
                    await checkAdminStatus(tgUser.id);
                }
            }

            await loadCategories();
            await loadCakes();
        }

        async function registerUser(tgUser) {
            try {
                const response = await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegramId: tgUser.id,
                        username: tgUser.username,
                        firstName: tgUser.first_name
                    })
                });
                return await response.json();
            } catch (error) {
                console.error('Ошибка регистрации:', error);
                return null;
            }
        }

        async function checkAdminStatus(telegramId) {
            try {
                const response = await fetch('/api/check-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: telegramId })
                });
                
                const data = await response.json();
                
                if (data.isAdmin) {
                    document.getElementById('adminBtn').style.display = 'inline-block';
                }
            } catch (error) {
                console.error('Ошибка проверки прав:', error);
            }
        }

        function goToAdmin() {
            window.location.href = '/admin';
        }

        async function loadCategories() {
            try {
                const response = await fetch('/api/categories');
                categories = await response.json();
                
                const nav = document.getElementById('categoriesNav');
                nav.innerHTML = '<button class="category-btn active" data-category-id="all">Все</button>';
                
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.dataset.categoryId = cat.id;
                    btn.textContent = cat.name;
                    btn.onclick = () => filterByCategory(cat.id);
                    nav.appendChild(btn);
                });
            } catch (error) {
                console.error('Ошибка загрузки категорий:', error);
            }
        }

        async function loadCakes() {
            try {
                const url = currentCategory === 'all' 
                    ? '/api/cakes' 
                    : `/api/cakes?categoryId=${currentCategory}`;
                
                const response = await fetch(url);
                allCakes = await response.json();
                displayCakes(allCakes);
            } catch (error) {
                console.error('Ошибка загрузки товаров:', error);
            }
        }

        function filterByCategory(categoryId) {
            currentCategory = categoryId;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.categoryId == categoryId || 
                    (categoryId === 'all' && btn.dataset.categoryId === 'all')) {
                    btn.classList.add('active');
                }
            });
            
            loadCakes();
        }

        function displayCakes(cakes) {
            const grid = document.getElementById('cakesGrid');
            grid.innerHTML = '';
            
            cakes.forEach(cake => {
                if (!cake.available) return;
                
                const card = document.createElement('div');
                card.className = 'cake-card';
                card.innerHTML = `
                    <img src="${cake.photo || 'https://via.placeholder.com/200'}" alt="${cake.name}" class="cake-image" loading="lazy">
                    <div class="cake-name">${cake.name}</div>
                    <div class="cake-description">${cake.description}</div>
                    <div class="cake-details">
                        <span class="cake-price">${cake.price} ₽</span>
                        <span class="cake-weight">${cake.weight} кг</span>
                    </div>
                    <button class="btn btn-primary" onclick="addToCart(${cake.id})">➕</button>
                `;
                grid.appendChild(card);
            });
        }

        function addToCart(cakeId) {
            const cake = allCakes.find(c => c.id === cakeId);
            if (!cake) return;
            
            const existingItem = cart.find(item => item.id === cakeId);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...cake, quantity: 1 });
            }
            
            updateCart();
            showNotification('Добавлено');
            
            if (tg) tg.HapticFeedback?.impactOccurred('light');
        }

        function removeFromCart(cakeId) {
            cart = cart.filter(item => item.id !== cakeId);
            updateCart();
        }

        function updateQuantity(cakeId, delta) {
            const item = cart.find(item => item.id === cakeId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(cakeId);
                } else {
                    updateCart();
                }
            }
        }

        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Пусто</p>';
                cartTotal.textContent = '0 ₽';
                return;
            }
            
            let html = '';
            let total = 0;
            
            cart.forEach(item => {
                total += item.price * item.quantity;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price}₽ × ${item.quantity}</div>
                        </div>
                        <div class="cart-item-actions">
                            <button class="cart-quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button class="cart-quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            <button class="cart-quantity-btn" onclick="removeFromCart(${item.id})" style="color: #B71C1C;">×</button>
                        </div>
                    </div>
                `;
            });
            
            cartItems.innerHTML = html;
            cartTotal.textContent = `${total} ₽`;
        }

        function openOrderModal() {
            if (cart.length === 0) {
                showNotification('Корзина пуста');
                return;
            }
            
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('deliveryDate').min = tomorrow.toISOString().split('T')[0];
            
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        async function submitOrder(event) {
            event.preventDefault();
            
            const orderData = {
                name: document.getElementById('customerName').value,
                phone: document.getElementById('customerPhone').value,
                address: document.getElementById('customerAddress').value,
                deliveryDate: document.getElementById('deliveryDate').value,
                deliveryTime: document.getElementById('deliveryTime').value,
                wish: document.getElementById('orderWish').value,
                cart: cart.map(item => ({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity,
                    weight: item.weight
                })),
                totalPrice: cart.reduce((sum, item) => sum + item.price * item.quantity, 0),
                userId: user?.telegramId || 0,
                username: user?.username || ''
            };
            
            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification('Заказ оформлен!');
                    cart = [];
                    updateCart();
                    closeOrderModal();
                    document.getElementById('orderForm').reset();
                    
                    if (tg) tg.HapticFeedback?.notification('success');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('Ошибка');
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        init();
    </script>
</body>
</html>
