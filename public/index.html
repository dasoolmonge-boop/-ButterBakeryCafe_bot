<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butter Bakery Cafe</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <div class="logo">🥐 Butter Bakery Cafe</div>
            <div class="user-info" id="userInfo">
                <span id="userName">Загрузка...</span>
            </div>
        </header>

        <!-- Навигация по категориям -->
        <div class="categories-nav" id="categoriesNav">
            <button class="category-btn active" data-category-id="all">Все</button>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            <h2>Наша выпечка</h2>
            <div class="cakes-grid" id="cakesGrid"></div>
        </div>

        <!-- Корзина -->
        <div class="cart-sidebar" id="cartSidebar">
            <h3>🛒 Корзина</h3>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal">Итого: 0 ₽</div>
            <button class="btn btn-primary btn-block" id="checkoutBtn" onclick="openOrderModal()">Оформить заказ</button>
        </div>
    </div>

    <!-- Модальное окно заказа -->
    <div id="orderModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Оформление заказа</h2>
                <button class="modal-close" onclick="closeOrderModal()">×</button>
            </div>
            <form id="orderForm" onsubmit="submitOrder(event)">
                <div class="form-group">
                    <label class="form-label">Ваше имя</label>
                    <input type="text" class="form-input" id="customerName" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Телефон</label>
                    <input type="tel" class="form-input" id="customerPhone" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Адрес доставки</label>
                    <textarea class="form-textarea" id="customerAddress" required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Дата доставки</label>
                    <input type="date" class="form-input" id="deliveryDate" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Время доставки</label>
                    <input type="time" class="form-input" id="deliveryTime" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Пожелания к заказу</label>
                    <textarea class="form-textarea" id="orderWish" placeholder="Например: позввонить за 30 минут"></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Подтвердить заказ</button>
            </form>
        </div>
    </div>

    <script>
        // Глобальные переменные
        let tg = window.Telegram?.WebApp;
        let user = null;
        let cart = [];
        let categories = [];
        let allCakes = [];
        let currentCategory = 'all';

        // Инициализация приложения
        async function init() {
            // Инициализация Telegram WebApp
            if (tg) {
                tg.expand();
                tg.ready();

                const tgUser = tg.initDataUnsafe?.user;
                if (tgUser) {
                    user = await registerUser(tgUser);
                    document.getElementById('userName').textContent = user.firstName || 'Гость';
                }
            }

            // Загружаем категории
            await loadCategories();

            // Загружаем товары
            await loadCakes();
        }

        // Регистрация пользователя
        async function registerUser(tgUser) {
            try {
                const response = await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegramId: tgUser.id,
                        username: tgUser.username,
                        firstName: tgUser.first_name
                    })
                });
                return await response.json();
            } catch (error) {
                console.error('Ошибка регистрации:', error);
                return null;
            }
        }

        // Загрузка категорий
        async function loadCategories() {
            try {
                const response = await fetch('/api/categories');
                categories = await response.json();

                const nav = document.getElementById('categoriesNav');
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.dataset.categoryId = cat.id;
                    btn.textContent = cat.name;
                    btn.onclick = () => filterByCategory(cat.id);
                    nav.appendChild(btn);
                });
            } catch (error) {
                console.error('Ошибка загрузки категорий:', error);
            }
        }

        // Загрузка товаров
        async function loadCakes() {
            try {
                const url = currentCategory === 'all'
                    ? '/api/cakes'
                    : `/api/cakes?categoryId=${currentCategory}`;

                const response = await fetch(url);
                allCakes = await response.json();
                displayCakes(allCakes);
            } catch (error) {
                console.error('Ошибка загрузки товаров:', error);
            }
        }

        // Фильтр по категории
        function filterByCategory(categoryId) {
            currentCategory = categoryId;

            // Обновляем активную кнопку
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.categoryId == categoryId ||
                    (categoryId === 'all' && btn.dataset.categoryId === 'all')) {
                    btn.classList.add('active');
                }
            });

            loadCakes();
        }

        // Отображение товаров
        function displayCakes(cakes) {
            const grid = document.getElementById('cakesGrid');
            grid.innerHTML = '';

            cakes.forEach(cake => {
                if (!cake.available) return;

                const card = document.createElement('div');
                card.className = 'cake-card';
                card.innerHTML = `
                    <img src="${cake.photo || 'https://via.placeholder.com/300'}" alt="${cake.name}" class="cake-image">
                    <div class="cake-name">${cake.name}</div>
                    <div class="cake-description">${cake.description}</div>
                    <div class="cake-details">
                        <span class="cake-price">${cake.price} ₽</span>
                        <span class="cake-weight">${cake.weight} кг</span>
                    </div>
                    <button class="btn btn-primary" onclick="addToCart(${cake.id})">Добавить в корзину</button>
                `;
                grid.appendChild(card);
            });
        }

        // Работа с корзиной
        function addToCart(cakeId) {
            const cake = allCakes.find(c => c.id === cakeId);
            if (!cake) return;

            const existingItem = cart.find(item => item.id === cakeId);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...cake, quantity: 1 });
            }

            updateCart();
            showNotification('Товар добавлен в корзину');
        }

        function removeFromCart(cakeId) {
            cart = cart.filter(item => item.id !== cakeId);
            updateCart();
        }

        function updateQuantity(cakeId, delta) {
            const item = cart.find(item => item.id === cakeId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(cakeId);
                } else {
                    updateCart();
                }
            }
        }

        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');

            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align: center; color: var(--text-light);">Корзина пуста</p>';
                cartTotal.textContent = 'Итого: 0 ₽';
                return;
            }

            let html = '';
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} ₽ × ${item.quantity}</div>
                        </div>
                        <div class="cart-item-actions">
                            <button class="cart-quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button class="cart-quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            <button class="cart-quantity-btn" onclick="removeFromCart(${item.id})" style="color: #B71C1C;">×</button>
                        </div>
                    </div>
                `;
            });

            cartItems.innerHTML = html;
            cartTotal.textContent = `Итого: ${total} ₽`;
        }

        // Оформление заказа
        function openOrderModal() {
            if (cart.length === 0) {
                showNotification('Корзина пуста!');
                return;
            }

            // Устанавливаем минимальную дату (сегодня + 1 день)
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('deliveryDate').min = tomorrow.toISOString().split('T')[0];

            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        async function submitOrder(event) {
            event.preventDefault();

            const orderData = {
                name: document.getElementById('customerName').value,
                phone: document.getElementById('customerPhone').value,
                address: document.getElementById('customerAddress').value,
                deliveryDate: document.getElementById('deliveryDate').value,
                deliveryTime: document.getElementById('deliveryTime').value,
                wish: document.getElementById('orderWish').value,
                cart: cart.map(item => ({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity,
                    weight: item.weight
                })),
                totalPrice: cart.reduce((sum, item) => sum + item.price * item.quantity, 0),
                userId: user?.telegramId || 0,
                username: user?.username || ''
            };

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const result = await response.json();

                if (result.success) {
                    showNotification('Заказ успешно оформлен!');
                    cart = [];
                    updateCart();
                    closeOrderModal();

                    // Очищаем форму
                    document.getElementById('orderForm').reset();
                } else {
                    showNotification('Ошибка при оформлении заказа');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('Ошибка сервера');
            }
        }

        // Уведомления
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Запуск приложения
        init();
    </script>
</body>
</html>
